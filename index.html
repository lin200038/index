<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Petit dialogue</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5e8e8;
            padding: 20px;
        }

        .chat-box {
            max-width: 500px;
            margin: auto;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 10px #ccc;
        }

        .message {
            padding: 12px;
            margin: 10px 0;
            border-radius: 12px;
            line-height: 1.5;
        }

        .guide {
            background: #e8f0ff;
            text-align: left;
        }

        .user {
            background: #d8ffd8;
            text-align: right;
        }

        button {
            display: block;
            width: 100%;
            margin: 8px 0;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #ff8fa3;
            color: white;
            font-size: 16px;
        }

        button:hover {
            background: #ff6f91;
        }
    </style>
</head>

<body>

<div class="chat-box">
    <div class="message guide">
        Aujourd'hui, mon guide m'a fait passer une journée très agréable.<br>
        Comment trouves-tu notre journée d'aujourd'hui ?
    </div>

    <button onclick="repondre('Heureux')">Heureux</button>
    <button onclick="repondre('moyen')">Moyen</button>
    <button onclick="repondre('ennuyé')">Ennuyé</button>
    <button onclick="repondre('amoureux')">Amoureux</button>

    <div id="chat"></div>
</div>

<script>
function repondre(status) {
    let chat = document.getElementById("chat");

    let reponse = "";

    if (status === "Heureux") {
        reponse = "C'est parce que j'ai rencontré un bon guide.";
    } 
    else if (status === "moyen") {
        reponse = "Oh là là, on devrait pouvoir faire mieux la prochaine fois.";
    } 
    else if (status === "ennuyé") {
        reponse = "Je ne sais pas si je peux faire mieux, mais je peux mieux.";
    } 
    else if (status === "amoureux") {
        reponse = "À mes côtés, tu pourrais être encore plus belle.";
    }

    chat.innerHTML = `
        <div class="message user">
            Tu trouve qu’aujourd’hui, c’est très ${status}.
        </div>

        <div class="message guide">
            ${reponse}
        </div>
    `;
}
</script>

</body>
</html>
